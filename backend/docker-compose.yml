services:
  # Django Application
  web:
    build: .
    container_name: digital_evidence_gap_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=production
      - DEBUG=False
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - SECURE_SSL_REDIRECT=True
      - SESSION_COOKIE_SECURE=True
      - CSRF_COOKIE_SECURE=True
    volumes:
      - ./logs:/app/logs
      - ./service-account-key.json:/app/service-account-key.json:ro
      - staticfiles:/app/staticfiles
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/users/register/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: digital_evidence_gap_mongodb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d
    ports:
      - "27017:27017"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Redis (Optional - for caching and sessions)
  redis:
    image: redis:7-alpine
    container_name: digital_evidence_gap_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx (Optional - for serving static files and reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: digital_evidence_gap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - staticfiles:/app/staticfiles
    depends_on:
      - web
    networks:
      - app_network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  staticfiles:
    driver: local

networks:
  app_network:
    driver: bridge